name: Feature request
description: Suggest an improvement to Browser Bailiff.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What review workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Browser Bailiff do differently?
    validations:
      required: true
