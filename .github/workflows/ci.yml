name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile
        run: python -m py_compile browser_bailiff.py

      - name: Test
        run: python -m unittest discover -s tests -v

      - name: Install CLI
        run: python -m pip install .

      - name: Check CLI entry point
        run: browser-bailiff --version

      - name: Check CLI runs without errors
        run: browser-bailiff --no-json || true
