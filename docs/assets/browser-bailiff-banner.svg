<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Browser Bailiff project banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070C16"/>
      <stop offset="100%" stop-color="#0C1525"/>
    </linearGradient>
    <radialGradient id="hf" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#7F1D1D" stop-opacity="0.78"/>
    </radialGradient>
    <radialGradient id="mf" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#78350F" stop-opacity="0.72"/>
    </radialGradient>
    <radialGradient id="lf" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#14532D" stop-opacity="0.65"/>
    </radialGradient>
    <filter id="hg"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect x="0" y="0" width="6" height="360" fill="#0284C7"/>

  <!-- faded scales watermark -->
  <g transform="translate(28,180)" opacity="0.04" stroke="#0EA5E9" stroke-width="4" fill="none">
    <rect x="0"   y="90" width="92" height="10" rx="2"/>
    <rect x="138" y="110" width="92" height="10" rx="2"/>
    <rect x="30"  y="62"  width="170" height="7" rx="2"/>
    <rect x="111" y="69"  width="10"  height="74" rx="2"/>
    <line x1="46"  y1="69" x2="46"  y2="90"/>
    <line x1="185" y1="69" x2="185" y2="110"/>
  </g>

  <!-- LEFT PANEL -->
  <text x="48" y="94"  font-family="'Courier New',Courier,monospace" font-size="58" font-weight="bold" fill="#FFFFFF">Browser</text>
  <text x="48" y="150" font-family="'Courier New',Courier,monospace" font-size="58" font-weight="bold" fill="#0EA5E9">Bailiff</text>
  <text x="52" y="180" font-family="'Courier New',Courier,monospace" font-size="11" fill="#164E63" letter-spacing="2">BROWSER EXTENSION AUDITOR</text>
  <text x="52" y="202" font-family="'Courier New',Courier,monospace" font-size="11" fill="#334155">What can your extensions actually do?</text>
  <g font-family="'Courier New',Courier,monospace" font-size="10">
    <rect x="52"  y="220" width="82"  height="18" rx="3" fill="#0B1929"/>
    <text x="60"  y="233" fill="#164E63">python </text><text x="103" y="233" fill="#0284C7">3.8+</text>
    <rect x="140" y="220" width="98"  height="18" rx="3" fill="#0B1929"/>
    <text x="148" y="233" fill="#164E63">read-only</text><text x="226" y="233" fill="#22C55E">✓</text>
    <rect x="244" y="220" width="56"  height="18" rx="3" fill="#0B1929"/>
    <text x="252" y="233" fill="#164E63">MIT </text><text x="274" y="233" fill="#22C55E">✓</text>
  </g>

  <!-- RIGHT PANEL: BUBBLE CHART — floating spheres, no window chrome -->
  <text x="820" y="40" font-family="'Courier New',Courier,monospace" font-size="8" fill="#0C2A40" letter-spacing="3" text-anchor="middle">14 EXTENSIONS AUDITED</text>

  <!-- HIGH — Unknown Publisher r=52 cx=688 cy=148 -->
  <circle cx="688" cy="148" r="52" fill="url(#hf)" filter="url(#hg)"/>
  <circle cx="688" cy="148" r="52" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.72"/>
  <text x="688" y="143" font-family="'Courier New',Courier,monospace" font-size="9" fill="#FCA5A5" text-anchor="middle">Unknown</text>
  <text x="688" y="157" font-family="'Courier New',Courier,monospace" font-size="9" fill="#FCA5A5" text-anchor="middle">Publisher</text>
  <text x="688" y="212" font-family="'Courier New',Courier,monospace" font-size="8" fill="#EF4444" text-anchor="middle">HIGH · 6 perms</text>

  <!-- HIGH — DevTools Helper r=44 cx=856 cy=100 -->
  <circle cx="856" cy="100" r="44" fill="url(#hf)" filter="url(#hg)"/>
  <circle cx="856" cy="100" r="44" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.65"/>
  <text x="856" y="96"  font-family="'Courier New',Courier,monospace" font-size="9" fill="#FCA5A5" text-anchor="middle">DevTools</text>
  <text x="856" y="110" font-family="'Courier New',Courier,monospace" font-size="9" fill="#FCA5A5" text-anchor="middle">Helper</text>
  <text x="856" y="156" font-family="'Courier New',Courier,monospace" font-size="8" fill="#EF4444" text-anchor="middle">HIGH · 5 perms</text>

  <!-- HIGH — TabSpy r=38 cx=778 cy=252 -->
  <circle cx="778" cy="252" r="38" fill="url(#hf)" filter="url(#sg)"/>
  <circle cx="778" cy="252" r="38" fill="none" stroke="#F87171" stroke-width="1.2" opacity="0.58"/>
  <text x="778" y="256" font-family="'Courier New',Courier,monospace" font-size="9" fill="#FCA5A5" text-anchor="middle">TabSpy</text>
  <text x="778" y="300" font-family="'Courier New',Courier,monospace" font-size="8" fill="#EF4444" text-anchor="middle">HIGH · 4 perms</text>

  <!-- MEDIUM — Password Vault r=36 cx=975 cy=188 -->
  <circle cx="975" cy="188" r="36" fill="url(#mf)"/>
  <circle cx="975" cy="188" r="36" fill="none" stroke="#F59E0B" stroke-width="1.2" opacity="0.58"/>
  <text x="975" y="184" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#FCD34D" text-anchor="middle">Password</text>
  <text x="975" y="197" font-family="'Courier New',Courier,monospace" font-size="8.5" fill="#FCD34D" text-anchor="middle">Vault</text>
  <text x="975" y="234" font-family="'Courier New',Courier,monospace" font-size="8"   fill="#D97706" text-anchor="middle">MEDIUM · 4 perms</text>

  <!-- MEDIUM — Screen Capture r=26 cx=1062 cy=90 -->
  <circle cx="1062" cy="90" r="26" fill="url(#mf)"/>
  <circle cx="1062" cy="90" r="26" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.48"/>
  <text x="1062" y="122" font-family="'Courier New',Courier,monospace" font-size="8" fill="#D97706" text-anchor="middle">Screen Cap</text>

  <!-- LOW — uBlock Origin r=27 cx=622 cy=282 -->
  <circle cx="622" cy="282" r="27" fill="url(#lf)"/>
  <circle cx="622" cy="282" r="27" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.42"/>
  <text x="622" y="316" font-family="'Courier New',Courier,monospace" font-size="8" fill="#4ADE80" text-anchor="middle">uBlock</text>

  <!-- LOW — JSON Formatter r=19 cx=530 cy=112 -->
  <circle cx="530" cy="112" r="19" fill="url(#lf)"/>
  <circle cx="530" cy="112" r="19" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.35"/>
  <text x="530" y="138" font-family="'Courier New',Courier,monospace" font-size="8" fill="#374151" text-anchor="middle">JSON fmt</text>

  <!-- LOW — Dark Reader r=19 cx=1060 cy=278 -->
  <circle cx="1060" cy="278" r="19" fill="url(#lf)"/>
  <circle cx="1060" cy="278" r="19" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.35"/>
  <text x="1060" y="304" font-family="'Courier New',Courier,monospace" font-size="8" fill="#374151" text-anchor="middle">Dark Reader</text>

  <!-- tiny LOW cluster -->
  <circle cx="998"  cy="308" r="16" fill="url(#lf)" opacity="0.8"/>
  <circle cx="1140" cy="172" r="12" fill="url(#lf)" opacity="0.65"/>
  <circle cx="1140" cy="310" r="11" fill="url(#lf)" opacity="0.55"/>
  <circle cx="560"  cy="308" r="10" fill="url(#lf)" opacity="0.5"/>
  <circle cx="490"  cy="172" r="8"  fill="url(#lf)" opacity="0.4"/>
  <circle cx="494"  cy="64"  r="7"  fill="url(#lf)" opacity="0.32"/>

  <!-- legend -->
  <g transform="translate(470,328)" font-family="'Courier New',Courier,monospace" font-size="9">
    <circle cx="5"   cy="-1" r="5" fill="#EF4444" opacity="0.75"/>
    <text x="14"  y="3" fill="#4B5563">HIGH</text>
    <circle cx="68"  cy="-1" r="5" fill="#F59E0B" opacity="0.72"/>
    <text x="77"  y="3" fill="#4B5563">MEDIUM</text>
    <circle cx="152" cy="-1" r="5" fill="#22C55E" opacity="0.6"/>
    <text x="161" y="3" fill="#2D3748">LOW</text>
    <text x="212" y="3" fill="#0F2A40">  bubble size = permission count</text>
  </g>

  <rect x="0" y="344" width="1200" height="16" fill="#0284C7" opacity="0.65"/>
</svg>
