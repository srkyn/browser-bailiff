<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Browser Bailiff project banner</title>
  <desc id="desc">A courthouse docket-themed banner for the Browser Bailiff extension auditor.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10202b"/>
      <stop offset="0.58" stop-color="#173044"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67d4c1"/>
      <stop offset="1" stop-color="#f2c36b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="360" fill="none" stroke="#2f5360" stroke-width="2"/>

  <g opacity="0.14" stroke="#a8e5d9" stroke-width="1">
    <path d="M0 80 H1200"/>
    <path d="M0 150 H1200"/>
    <path d="M0 220 H1200"/>
    <path d="M0 290 H1200"/>
    <path d="M180 0 V360"/>
    <path d="M470 0 V360"/>
    <path d="M820 0 V360"/>
    <path d="M1040 0 V360"/>
  </g>

  <g transform="translate(817 76)" filter="url(#shadow)">
    <rect x="0" y="0" width="248" height="198" rx="8" fill="#f3efe2" stroke="#f2c36b" stroke-width="4"/>
    <rect x="24" y="28" width="200" height="18" rx="3" fill="#173044"/>
    <rect x="24" y="70" width="200" height="12" rx="3" fill="#5f7480"/>
    <rect x="24" y="102" width="170" height="12" rx="3" fill="#5f7480"/>
    <rect x="24" y="134" width="188" height="12" rx="3" fill="#5f7480"/>
    <circle cx="200" cy="156" r="28" fill="#67d4c1" stroke="#173044" stroke-width="5"/>
    <path d="M188 156 L198 166 L215 144" fill="none" stroke="#173044" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(78 72)">
    <rect x="0" y="0" width="118" height="28" rx="4" fill="#67d4c1"/>
    <text x="15" y="19" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#10202b">DOCKET</text>
    <text x="0" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="68" font-weight="800" fill="#f8fbfa">Browser Bailiff</text>
    <rect x="0" y="112" width="510" height="5" fill="url(#accent)"/>
    <text x="0" y="162" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#d8e8e6">Extension Permission Auditor</text>
    <text x="0" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#bdd2d4">Audit browser extensions before quiet permissions become operational risk.</text>
  </g>
</svg>
