<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Browser Bailiff project banner</title>
  <desc id="desc">A professional court-record themed banner for the Browser Bailiff extension auditor.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="0.55" stop-color="#16283a"/>
      <stop offset="1" stop-color="#26323f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d6b25e"/>
      <stop offset="1" stop-color="#8ed3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="360" fill="none" stroke="#385166" stroke-width="2"/>

  <g opacity="0.14" stroke="#d7e6e4" stroke-width="1">
    <path d="M0 82 H1200"/>
    <path d="M0 150 H1200"/>
    <path d="M0 218 H1200"/>
    <path d="M0 286 H1200"/>
    <path d="M160 0 V360"/>
    <path d="M450 0 V360"/>
    <path d="M800 0 V360"/>
    <path d="M1038 0 V360"/>
  </g>

  <g transform="translate(795 60)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="230" rx="10" fill="#f4f0e6" stroke="#d6b25e" stroke-width="4"/>
    <rect x="28" y="28" width="194" height="18" rx="3" fill="#142235"/>
    <rect x="28" y="68" width="194" height="12" rx="3" fill="#607080"/>
    <rect x="28" y="98" width="166" height="12" rx="3" fill="#607080"/>
    <rect x="28" y="128" width="184" height="12" rx="3" fill="#607080"/>
    <rect x="28" y="158" width="140" height="12" rx="3" fill="#607080"/>
    <circle cx="196" cy="178" r="28" fill="#8ed3c7" stroke="#142235" stroke-width="5"/>
    <path d="M182 178 H210" stroke="#142235" stroke-width="7" stroke-linecap="round"/>
    <path d="M196 164 V192" stroke="#142235" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g transform="translate(78 72)">
    <rect x="0" y="0" width="144" height="28" rx="4" fill="#d6b25e"/>
    <text x="15" y="19" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#0d1b2a">PERMISSION REVIEW</text>
    <text x="0" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="68" font-weight="800" fill="#f8fbfa">Browser Bailiff</text>
    <rect x="0" y="112" width="510" height="5" fill="url(#accent)"/>
    <text x="0" y="162" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#dde9e8">Extension Permission Auditor</text>
    <text x="0" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#c4d4d8">Review browser extension permissions, host access, and age.</text>
  </g>
</svg>
